<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Split Login</title>
    <!-- Link to external CSS stylesheet -->
    <link rel="stylesheet" href="styles.css">
    <!-- Google Fonts for crisp Inter typography -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Development Library for Minimalist SVG Icons -->
    <script src="https://unpkg.com"></script>
</head>
<body>

    <div class="split-wrapper">
        <!-- LEFT PANEL: Interactive Login Form -->
        <div class="left-panel">
            <div class="login-header">
                <h2>Welcome back</h2>
                <p>Please enter your details to sign in.</p>
            </div>
            
            <form class="login-form" action="#" method="POST">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <i data-lucide="mail" class="field-icon"></i>
                        <input type="email" id="email" placeholder="name@company.com" required autocomplete="email">
                    </div>
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i data-lucide="lock" class="field-icon"></i>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                </div>
                
                <div class="form-actions">
                    <div class="remember-me">
                        <input type="checkbox" id="remember">
                        <label for="remember">Remember me</label>
                    </div>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>
                
                <button type="submit" class="submit-btn">Sign In</button>
            </form>
            
            <div class="login-footer">
                <p>Don't have an account? <a href="#">Create one free</a></p>
            </div>
        </div>

        <!-- RIGHT PANEL: Minimalist Visual Branding Elements -->
        <div class="right-panel">
            <!-- Central Profile Avatar / Logo Placeholder -->
            <div class="logo-area">
                <div class="profile-avatar">
                    <i data-lucide="user" class="avatar-icon"></i>
                </div>
                <h3>Enterprise Core</h3>
                <p>Secure Identity Gateway</p>
            </div>
            
            <!-- Lower Horizontal Minimalist Feature Elements -->
            <div class="minimal-features">
                <div class="feature-badge">
                    <i data-lucide="shield-check"></i>
                    <span>E2E Encryption</span>
                </div>
                <div class="feature-badge">
                    <i data-lucide="zap"></i>
                    <span>Instant Sync</span>
                </div>
            </div>
            
        </div>
    </div>

       <!-- Replace your old script block with this precise execution block -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            } else {
                console.error("Lucide CDN failed to load. Check your internet connection.");
            }
            
        });
    </script>
</body>

</html>
